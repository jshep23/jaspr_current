name: "Examples"

on:
  pull_request:
    paths:
      - "example/**"
      - "lib/**"
      - ".github/workflows/validate_examples.yml"

  push:
    branches:
      - main
    paths:
      - "example/**"
      - "lib/**"
      - ".github/workflows/validate_examples.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  examples:
    name: Validate examples
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: example

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 'Setup Dart'
        uses: dart-lang/setup-dart@v1.3
      
      - name: 'Configure Jaspr'
        run: dart pub get && dart analyze && dart test
      
      - name: Run Lint and Tests
        run: dart analyze && dart test
      
      - name: Jaspr Build
        run: jaspr build --verbose
